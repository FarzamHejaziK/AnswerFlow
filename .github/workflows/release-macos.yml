name: Release (macOS signed + notarized)

# Builds a Developer ID-signed, notarized, stapled macOS release (dmg + zip)
# for both arm64 and x64, then uploads the artifacts to the GitHub Release.
#
# This mirrors the LOCAL signing path (`npm run dist:signed` →
# electron-builder.signed.cjs). The .app is signed + notarized + stapled by
# electron-builder's built-in `mac.notarize: true` (notarytool under the hood),
# and the DMGs are signed + notarized + stapled by scripts/afterAllArtifactBuild.cjs.
# The only difference vs local is credential delivery: locally we use the
# `answercue-notary` keychain profile; in CI we can use either an App Store
# Connect API key (recommended) or the Apple ID + app-specific password style
# already used by ClickCherry. Both built-in notarize and the DMG hook read
# those env vars.
#
# ── REQUIRED REPOSITORY SECRETS ────────────────────────────────────────────
#   Certificate, either AnswerCue-style:
#     MACOS_CERT_P12_BASE64   base64 of exported "Developer ID Application" .p12
#     MACOS_CERT_PASSWORD     password set when exporting the .p12
#   or ClickCherry-style:
#     APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64
#     APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD
#
#   Notarization, either API-key style:
#     APPLE_API_KEY_P8_BASE64 base64 of the App Store Connect API key .p8 file
#     APPLE_API_KEY_ID        key id
#     APPLE_API_ISSUER        issuer UUID
#   or ClickCherry-style:
#     APPLE_ID
#     APPLE_APP_SPECIFIC_PASSWORD
#     APPLE_TEAM_ID
#
#   Optional:
#     KEYCHAIN_PASSWORD       throwaway password for the temporary CI keychain
#
# Notes:
#   - We do NOT use the local `answercue-notary` keychain profile in CI — that
#     profile only exists on the developer's machine. CI credentials are supplied
#     by GitHub Actions secrets.
#   - electron-builder imports the signing cert from CSC_LINK (the .p12) and
#     auto-discovers the Developer ID identity, so we do NOT set
#     ANSWERCUE_SIGN_IDENTITY here (the .signed.cjs config treats undefined as
#     "auto-discover").

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {} # manual trigger uses the branch/tag selected in the Actions UI

permissions:
  contents: write # needed to upload release assets

jobs:
  build-macos:
    runs-on: macos-14 # Apple Silicon runner; builds both arches via ANSWERCUE_BUILD_ALL_MAC_ARCHES
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          # Defaults to the triggering ref (tag on push, selected ref on dispatch).
          # No untrusted-input ref interpolation.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust (native module)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Import Developer ID signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 || secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD || secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12_BASE64:-}" ] || [ -z "${MACOS_CERT_PASSWORD:-}" ]; then
            echo "::warning::macOS signing secrets are not configured; building unsigned macOS artifacts."
            echo "MACOS_SIGNING_AVAILABLE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$(openssl rand -hex 16)}"
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/answercue-signing.keychain-db"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          # Allow codesign to use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Make the temp keychain the default search list (+ keep login keychain).
          security list-keychains -d user -s "$KEYCHAIN_PATH" "login.keychain-db"
          echo "Imported identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          # Export CSC_LINK for electron-builder (it can also read the keychain directly,
          # but pointing it at the .p12 is the most deterministic path).
          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$MACOS_CERT_PASSWORD" >> "$GITHUB_ENV"
          echo "MACOS_SIGNING_AVAILABLE=true" >> "$GITHUB_ENV"

      - name: Configure Apple notarization credentials
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_ID_CI: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_CI: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_CI: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ "${MACOS_SIGNING_AVAILABLE:-false}" != "true" ]; then
            echo "MACOS_NOTARIZATION_AVAILABLE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -n "${APPLE_API_KEY_P8_BASE64:-}" ]; then
            API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
            echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"
            echo "MACOS_NOTARIZATION_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "MACOS_NOTARIZATION_STRATEGY=api-key" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -n "${APPLE_ID_CI:-}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD_CI:-}" ] && [ -n "${APPLE_TEAM_ID_CI:-}" ]; then
            echo "MACOS_NOTARIZATION_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "MACOS_NOTARIZATION_STRATEGY=apple-id" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "::warning::Apple notarization secrets are not configured; building unsigned macOS artifacts."
          echo "MACOS_NOTARIZATION_AVAILABLE=false" >> "$GITHUB_ENV"

      - name: Require signing for tagged macOS releases
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          if [ "${MACOS_SIGNING_AVAILABLE:-false}" != "true" ]; then
            echo "::error::macOS signing secrets are missing. Refusing to publish unsigned release artifacts."
            exit 1
          fi
          if [ "${MACOS_NOTARIZATION_AVAILABLE:-false}" != "true" ]; then
            echo "::error::Apple notarization secrets are missing. Refusing to publish non-notarized release artifacts."
            exit 1
          fi

      - name: Build macOS artifacts
        env:
          # App Store Connect API-key strategy (built-in notarytool + DMG hook):
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # ClickCherry-compatible Apple ID strategy:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Keep GH_TOKEN available for tools that expect it, but pass
          # `--publish never` below so electron-builder cannot attach partial
          # ZIPs before DMG signing/notarization verification succeeds.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${MACOS_SIGNING_AVAILABLE:-false}" = "true" ] && [ "${MACOS_NOTARIZATION_AVAILABLE:-false}" = "true" ]; then
            echo "Building signed + notarized macOS artifacts using ${MACOS_NOTARIZATION_STRATEGY:-unknown} notarization."
            npm run build
            npm run build:electron
            ANSWERCUE_BUILD_ALL_MAC_ARCHES=1 npm run build:native
            node scripts/download-models.js
            node scripts/ensure-sharp-mac-deps.js
            npx electron-builder --config electron-builder.signed.cjs --publish never
          else
            echo "::warning::Building unsigned macOS artifacts because signing/notarization secrets are incomplete."
            npm run build
            npm run build:electron
            ANSWERCUE_BUILD_ALL_MAC_ARCHES=1 npm run build:native
            node scripts/download-models.js
            node scripts/ensure-sharp-mac-deps.js
            CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --publish never
          fi

      - name: Verify signature + notarization (both arches + DMGs)
        if: env.MACOS_SIGNING_AVAILABLE == 'true'
        run: |
          set -euo pipefail
          APPS=$(find release -maxdepth 2 -name 'AnswerCue.app' -path '*mac*')
          if [ -z "$APPS" ]; then echo "No AnswerCue.app found in release/"; exit 1; fi
          for APP in $APPS; do
            echo "::group::Verifying app: $APP"
            codesign -dv --verbose=4 "$APP" 2>&1 | sed -n '1,20p'
            codesign --verify --deep --strict --verbose=4 "$APP"
            spctl -a -vvv -t execute "$APP"          # expect: accepted / source=Notarized Developer ID
            xcrun stapler validate "$APP"
            echo "::endgroup::"
          done
          # DMGs are signed + notarized + stapled by scripts/afterAllArtifactBuild.cjs.
          shopt -s nullglob
          DMGS=(release/*.dmg)
          if [ ${#DMGS[@]} -eq 0 ]; then echo "No DMGs found in release/"; exit 1; fi
          for DMG in "${DMGS[@]}"; do
            echo "::group::Verifying dmg: $DMG"
            xcrun stapler validate "$DMG"            # hard requirement
            spctl -a -vvv -t open --context context:primary-signature "$DMG" || true  # informational
            echo "::endgroup::"
          done

      - name: Verify unsigned macOS artifacts
        if: env.MACOS_SIGNING_AVAILABLE != 'true'
        run: |
          set -euo pipefail
          APPS=$(find release -maxdepth 2 -name 'AnswerCue.app' -path '*mac*')
          if [ -z "$APPS" ]; then echo "No AnswerCue.app found in release/"; exit 1; fi
          shopt -s nullglob
          DMGS=(release/*.dmg)
          ZIPS=(release/*.zip)
          if [ ${#DMGS[@]} -eq 0 ]; then echo "No DMGs found in release/"; exit 1; fi
          if [ ${#ZIPS[@]} -eq 0 ]; then echo "No ZIPs found in release/"; exit 1; fi
          ls -lh release/*.dmg release/*.zip release/latest-mac.yml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: answercue-macos
          path: |
            release/*.dmg
            release/*.blockmap
            release/*.zip
            release/latest*.yml
          if-no-files-found: error

      - name: Upload artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release/*.dmg release/*.blockmap release/*.zip release/latest*.yml)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No macOS release assets found in release/"
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
