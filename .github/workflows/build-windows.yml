name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - '**/*.md'

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and Electron main
        run: |
          npm run build
          npm run build:electron

      - name: Build Windows native module
        run: npm run build:native

      - name: Package Windows x64 installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ("${{ startsWith(github.ref, 'refs/tags/v') }}" -eq "true") {
            npx electron-builder --win nsis:x64 --publish always
          } else {
            npx electron-builder --win nsis:x64 --publish never
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: answerflow-windows-x64-installer
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error
