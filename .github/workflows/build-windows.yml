name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - '**/*.md'

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and Electron main
        run: |
          npm run build
          npm run build:electron

      - name: Build Windows native module
        run: npm run build:native

      - name: Verify package inputs exist
        run: npm run verify:package-inputs -- --require-native

      - name: Package Windows x64 installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_CODESIGNING_ENDPOINT: ${{ secrets.AZURE_CODESIGNING_ENDPOINT }}
          AZURE_CODESIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_CODESIGNING_ACCOUNT_NAME }}
          AZURE_CODESIGNING_PROFILE_NAME: ${{ secrets.AZURE_CODESIGNING_PROFILE_NAME }}
          AZURE_CODESIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_CODESIGNING_PUBLISHER_NAME }}
        run: |
          if ("${{ startsWith(github.ref, 'refs/tags/v') }}" -eq "true") {
            npx electron-builder --config electron-builder.windows.cjs --win nsis:x64 --publish always
          } else {
            npx electron-builder --config electron-builder.windows.cjs --win nsis:x64 --publish never
          }

      - name: Verify packaged renderer exists
        run: node scripts/verify-package-inputs.js release/win-unpacked/resources/app.asar

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: answercue-windows-x64-installer
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error
